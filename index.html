const parseDate=v=>{if(!v)return new Date().toISOString().split("T")[0];if(v instanceof Date)return v.toISOString().split("T")[0];if(typeof v==="number"){const d=new Date(Math.round((v-25569)*864e5));return d.toISOString().split("T")[0];}return String(v).match(/\d{4}-\d{2}-\d{2}/)?.[0]||new Date().toISOString().split("T")[0];};

function toExcelBuf(data){const rows=[XCOLS,...data.map(s=>[s.id,s.tipo,s.tag,s.local,s.engeman||"",s.status,s.criticidade,s.descricao,s.sugestao||"",s.data,s.setor,s.responsavel||"",s.prazo||"",s.observacoes||"",s.temFotoConclusao?"Sim":"Não",s.dataConclusao||"",Array.isArray(s.historicoStatus)?s.historicoStatus.join(" | "):s.historicoStatus||""])];const ws=XL.utils.aoa_to_sheet(rows);ws["!cols"]=[8,12,10,14,10,14,16,40,30,14,14,16,10,30,12,14,50].map(w=>({wch:w}));const wb=XL.utils.book_new();XL.utils.book_append_sheet(wb,ws,"Solicitações");return XL.write(wb,{type:"array",bookType:"xlsx"});}
function fromExcelFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const wb=XL.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XL.utils.sheet_to_json(ws,{header:1,defval:""});if(rows.length<2){res([]);return;}const h=rows[0].map(x=>String(x||"").toLowerCase());const fi=(...ks)=>{for(const k of ks){const i=h.findIndex(x=>x.includes(k));if(i>=0)return i;}return -1;};const iI=fi("id"),iT=fi("tipo"),iTAG=fi("tag"),iL=fi("local"),iE=fi("engeman"),iS=fi("status"),iC=fi("criticidade","nível"),iD=fi("descrição","descricao"),iSu=fi("sugestão","sugestao"),iDt=fi("data de"),iSe=fi("setor"),iR=fi("responsável","responsavel manut"),iP=fi("prazo"),iO=fi("observa"),iFo=fi("foto concl"),iDc=fi("data concl"),iH=fi("histórico","historico");const imported=rows.slice(1).filter(r=>r.some(c=>c!=="")).map((r,i)=>({id:(iI>=0&&r[iI])?String(r[iI]):`IMP-${String(i+1).padStart(3,"0")}`,tipo:(iT>=0&&r[iT])?r[iT]:"Corretiva",tag:iTAG>=0?String(r[iTAG]||""):"",local:iL>=0?String(r[iL]||""):"",engeman:iE>=0?String(r[iE]||""):"",status:iS>=0?String(r[iS]||"Pendente"):"Pendente",criticidade:iC>=0?String(r[iC]||"médio").toLowerCase():"médio",descricao:iD>=0?String(r[iD]||""):"",sugestao:iSu>=0?String(r[iSu]||""):"",data:iDt>=0?parseDate(r[iDt]):new Date().toISOString().split("T")[0],setor:iSe>=0?String(r[iSe]||"Mecânica"):"Mecânica",img:null,criadoEm:new Date().toISOString(),responsavel:iR>=0?String(r[iR]||""):"",prazo:iP>=0?parseDate(r[iP]):"",observacoes:iO>=0?String(r[iO]||""):"",temFotoConclusao:iFo>=0?String(r[iFo]||"").toLowerCase()==="sim":false,dataConclusao:iDc>=0?parseDate(r[iDc]):"",historicoStatus:iH>=0&&r[iH]?String(r[iH]).split(" | ").filter(Boolean):[],}));res(imported);}catch(err){rej(err);}};r.onerror=rej;r.readAsArrayBuffer(file);});}
const SAMPLE=[{id:"SOL-001",tipo:"Corretiva",tag:"TC-017A",local:"Stock House",engeman:"1087",status:"Pendente",criticidade:"médio",descricao:"Desalinhamento da correia transportadora causando queda de material",sugestao:"Ajuste nos guias laterais",data:"2025-04-15",setor:"Mecânica",img:null,criadoEm:"2025-04-15T08:30:00Z",...newRec()},{id:"SOL-002",tipo:"Corretiva",tag:"MC-003",local:"Moinho 1",engeman:"1088",status:"Em andamento",criticidade:"alto",descricao:"Vibração anormal no rolamento do motor principal",sugestao:"Substituição do rolamento 6310",data:"2025-04-16",setor:"Mecânica",img:null,criadoEm:"2025-04-16T10:00:00Z",...newRec(),responsavel:"João Silva"},{id:"SOL-003",tipo:"Melhoria",tag:"IN-008",local:"Processo",engeman:"",status:"Pendente",criticidade:"médio",descricao:"Sensor de nível com leitura inconsistente variando ±5%",sugestao:"Calibração ou substituição",data:"2025-04-19",setor:"Instrumentação",img:null,criadoEm:"2025-04-19T14:00:00Z",...newRec()},{id:"SOL-004",tipo:"Preventiva",tag:"BC-011",local:"Britagem",engeman:"1090",status:"Concluído",criticidade:"baixo",descricao:"Vazamento de graxa no mancal da britadeira cônica",sugestao:"Reaperto e troca de vedação",data:"2025-03-18",setor:"Mecânica",img:null,criadoEm:"2025-03-18T09:00:00Z",...newRec(),responsavel:"Carlos Mendes",dataConclusao:"2025-03-20",historicoStatus:["20/03/2025 14:30 — Pendente → Concluído"]},{id:"SOL-005",tipo:"Corretiva",tag:"HY-002",local:"Sala Hidráulica",engeman:"1093",status:"Concluído",criticidade:"alto",descricao:"Pressão do sistema hidráulico 30% abaixo do especificado",sugestao:"Inspeção da bomba e vazamentos",data:"2025-02-21",setor:"Mecânica",img:null,criadoEm:"2025-02-21T08:00:00Z",...newRec(),responsavel:"Carlos Mendes",dataConclusao:"2025-02-23",historicoStatus:["22/02 — Pendente → Em andamento","23/02 — Em andamento → Concluído"]}];
function Badge({value,type}){const c=type==="tipo"?TIPO_COL[value]:type==="criticidade"?CRIT_COL[value]:STAT_COL[value]||"#64748b";return html`<span style=${{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 9px",borderRadius:12,background:c+"22",border:`1px solid ${c}55`,color:c,fontSize:11,fontWeight:700,textTransform:"capitalize",whiteSpace:"nowrap"}}>${type==="tipo"?html`<span>${TIPO_ICO[value]}</span>`:null}${value}</span>`;}
function WelcomeScreen({onConnect,onFileLoad,onDemo}){const hasFSA=typeof window.showDirectoryPicker==="function";const fileRef=useRef();const [connecting,setConnecting]=useState(false);const doConnect=async()=>{setConnecting(true);try{const h=await window.showDirectoryPicker({mode:"readwrite"});onConnect(h);}catch{}setConnecting(false);};return html`<div style=${{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}><div style=${{textAlign:"center",marginBottom:40}}><div style=${{fontSize:9,letterSpacing:6,color:"#f59e0b",fontWeight:700,marginBottom:10}}>TECNORED — PRODUÇÃO & MANUTENÇÃO</div><h1 style=${{fontSize:38,fontWeight:800,color:"#f1f5f9",lineHeight:1.1,letterSpacing:-1.5}}>GESTÃO DE NÃO<br/>CONFORMIDADES</h1><p style=${{marginTop:12,color:"#64748b",fontSize:14}}>Conecte a pasta do SharePoint para começar</p></div><div style=${{display:"flex",flexDirection:"column",gap:10,maxWidth:420,width:"100%"}}>${hasFSA?html`<button onClick=${doConnect} disabled=${connecting} style=${{background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"16px 24px",fontSize:16,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}><span>📁</span>${connecting?"Aguardando seleção...":"Conectar pasta do SharePoint / OneDrive"}</button>`:null}<div style=${{background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:16}}><div style=${{fontSize:11,color:"#64748b",fontWeight:700,letterSpacing:1,marginBottom:10}}>ALTERNATIVA — SEM SHAREPOINT</div><input ref=${fileRef} type="file" accept=".xlsx,.xls" onChange=${onFileLoad}/><button onClick=${()=>fileRef.current.click()} style=${{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:9,padding:"11px",color:"#94a3b8",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><span>📂</span>Carregar arquivo Excel manualmente</button></div><button onClick=${onDemo} style=${{background:"none",border:"1px solid #334155",borderRadius:10,padding:"11px",color:"#475569",cursor:"pointer",fontSize:13}}>🧪 Entrar com dados de demonstração</button></div><p style=${{marginTop:28,fontSize:11,color:"#334155",maxWidth:380,textAlign:"center",lineHeight:1.6}}>Ao conectar, o sistema lê e salva <strong style=${{color:"#475569"}}>Tecnored_NC.xlsx</strong> diretamente no SharePoint via OneDrive.</p></div>`;}
function RoleSelector({onSelect,folderName}){const [hov,setHov]=useState(null);const roles=[{id:"tecnico",label:"Técnico de Operação",desc:"Abrir nova solicitação",icon:"🔧"},{id:"manutencao",label:"Programador de Manutenção",desc:"Gerenciar e atualizar",icon:"📋"},{id:"gestao",label:"Gestão",desc:"Dashboard executivo",icon:"📊"}];return html`<div style=${{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}><div style=${{textAlign:"center",marginBottom:36}}><div style=${{fontSize:9,letterSpacing:6,color:"#f59e0b",fontWeight:700,marginBottom:8}}>TECNORED</div><h1 style=${{fontSize:34,fontWeight:800,color:"#f1f5f9",lineHeight:1.1,letterSpacing:-1}}>GESTÃO DE NÃO<br/>CONFORMIDADES</h1>${folderName?html`<div style=${{marginTop:10,display:"inline-flex",alignItems:"center",gap:6,background:"#22c55e11",border:"1px solid #22c55e44",borderRadius:8,padding:"5px 12px",color:"#22c55e",fontSize:12,fontWeight:600}}>✅ ${folderName}</div>`:null}</div><div style=${{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center"}}>${roles.map(r=>html`<button key=${r.id} onClick=${()=>onSelect(r.id)} onMouseEnter=${()=>setHov(r.id)} onMouseLeave=${()=>setHov(null)} style=${{background:hov===r.id?"#1e3a5f":"#1e293b",border:`2px solid ${hov===r.id?"#f59e0b":"#334155"}`,borderRadius:14,padding:"24px 20px",cursor:"pointer",textAlign:"left",width:195,transition:"all 0.17s",outline:"none",display:"flex",flexDirection:"column",gap:10,transform:hov===r.id?"translateY(-3px)":""}}><span style=${{fontSize:32}}>${r.icon}</span><div><div style=${{color:"#f1f5f9",fontWeight:700,fontSize:14}}>${r.label}</div><div style=${{color:"#64748b",fontSize:12,marginTop:3}}>${r.desc}</div></div></button>`)}</div></div>`;}
function Header({role,onBack,pendentes,data,dirHandle,setDirHandle,onLoadFromSP,onSaveToSP,onImportFile,saveStatus}){const labels={tecnico:"Técnico de Operação",manutencao:"Programador de Manutenção",gestao:"Gestão Executiva"};const fileRef=useRef();const hasFSA=typeof window.showDirectoryPicker==="function";const [exp,setExp]=useState(false);const connectSP=async()=>{try{const h=await window.showDirectoryPicker({mode:"readwrite"});setDirHandle(h);setTimeout(()=>onLoadFromSP(h),200);}catch{}};const downloadExcel=()=>{const buf=toExcelBuf(data);const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=FILENAME;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);setExp(true);setTimeout(()=>setExp(false),2500);};const sLabel={idle:"",saving:"Salvando...",ok:"✓ Salvo",err:"Erro ao salvar"};const sColor={idle:"#64748b",saving:"#f59e0b",ok:"#22c55e",err:"#ef4444"};return html`<div style=${{background:"#1e293b",borderBottom:"1px solid #334155",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}><button onClick=${onBack} style=${{background:"none",border:"1px solid #334155",borderRadius:7,padding:"4px 10px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>← Sair</button><div style=${{width:1,height:22,background:"#334155"}}></div><div style=${{flex:1,minWidth:120}}><div style=${{fontSize:8,letterSpacing:4,color:"#f59e0b",fontWeight:700}}>TECNORED</div><div style=${{color:"#f1f5f9",fontWeight:700,fontSize:12}}>${labels[role]}</div></div>${saveStatus&&saveStatus!=="idle"?html`<span style=${{fontSize:11,color:sColor[saveStatus]}}>${sLabel[saveStatus]}</span>`:null}${pendentes>0?html`<div style=${{background:"#ef444422",border:"1px solid #ef444455",borderRadius:20,padding:"2px 9px",fontSize:11,color:"#ef4444",fontWeight:700}}>${pendentes} pendente${pendentes!==1?"s":""}</div>`:null}<div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>${hasFSA&&!dirHandle?html`<button onClick=${connectSP} style=${{display:"flex",alignItems:"center",gap:5,background:"#0f172a",border:"1px solid #334155",borderRadius:7,padding:"5px 11px",color:"#94a3b8",cursor:"pointer",fontSize:11,fontWeight:600}}>📁 Conectar SharePoint</button>`:null}${hasFSA&&dirHandle?html`<div style=${{display:"flex",alignItems:"center",gap:5,background:"#22c55e11",border:"1px solid #22c55e44",borderRadius:7,padding:"5px 10px",color:"#22c55e",fontSize:11,fontWeight:600}}>✅ ${dirHandle.name}</div><button onClick=${()=>onLoadFromSP(dirHandle)} style=${{background:"#0f172a",border:"1px solid #334155",borderRadius:7,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>🔄 Recarregar</button><button onClick=${()=>onSaveToSP(dirHandle,data)} style=${{background:"#f59e0b22",border:"1px solid #f59e0b",borderRadius:7,padding:"5px 10px",color:"#f59e0b",cursor:"pointer",fontSize:11,fontWeight:700}}>💾 Salvar SharePoint</button>`:null}${!hasFSA?html`<input ref=${fileRef} type="file" accept=".xlsx,.xls" onChange=${onImportFile}/><button onClick=${()=>fileRef.current.click()} style=${{background:"#0f172a",border:"1px solid #334155",borderRadius:7,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>📂 Carregar Excel</button><button onClick=${downloadExcel} style=${{background:exp?"#22c55e22":"#f59e0b22",border:`1px solid ${exp?"#22c55e":"#f59e0b"}`,borderRadius:7,padding:"5px 10px",color:exp?"#22c55e":"#f59e0b",cursor:"pointer",fontSize:11,fontWeight:700}}>${exp?"✅ Exportado!":"📤 Exportar Excel"}</button>`:null}</div></div>`;}
function TecnicoView({onSubmit}){const def={tipo:"Corretiva",tag:"",local:"",engeman:"",criticidade:"médio",descricao:"",sugestao:"",data:new Date().toISOString().split("T")[0],setor:"Mecânica",img:null,...newRec()};const [form,setForm]=useState(def);const [errs,setErrs]=useState({});const [done,setDone]=useState(null);const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrs(e=>({...e,[k]:""}));};const handleImg=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>set("img",ev.target.result);r.readAsDataURL(f);};const submit=()=>{const e={};if(!form.tag.trim())e.tag="Obrigatório";if(!form.local)e.local="Obrigatório";if(!form.descricao.trim())e.descricao="Obrigatório";if(Object.keys(e).length){setErrs(e);return;}setDone({id:onSubmit({...form}),tipo:form.tipo});};if(done)return html`<div style=${{flex:1,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f172a"}}><div style=${{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:36,textAlign:"center",maxWidth:380}}><div style=${{fontSize:48,marginBottom:12}}>✅</div><div style=${{fontSize:20,fontWeight:800,color:"#f1f5f9",marginBottom:6}}>Solicitação enviada!</div><div style=${{fontSize:17,color:TIPO_COL[done.tipo]||"#f59e0b",fontWeight:800,marginBottom:14}}>${done.id}</div><p style=${{color:"#64748b",fontSize:12,marginBottom:20}}>Registrada com sucesso.</p><button onClick=${()=>{setDone(null);setForm(def);}} style=${{background:"#f59e0b",color:"#000",border:"none",borderRadius:10,padding:"11px 24px",fontSize:14,fontWeight:800,cursor:"pointer"}}>Nova Solicitação</button></div></div>`;const FW=({label,err,children})=>html`<div style=${{display:"flex",flexDirection:"column",gap:4}}><label style=${{fontSize:10,fontWeight:700,color:"#64748b",letterSpacing:1}}>${label}</label>${children}${err?html`<span style=${{fontSize:10,color:"#ef4444"}}>${err}</span>`:null}</div>`;return html`<div style=${{flex:1,background:"#0f172a",overflow:"auto",padding:16}}><div style=${{maxWidth:600,margin:"0 auto"}}><div style=${{marginBottom:16}}><h2 style=${{fontSize:20,fontWeight:800,color:"#f1f5f9"}}>Nova Solicitação</h2><p style=${{color:"#64748b",fontSize:12,marginTop:2}}>Preencha os dados da não conformidade identificada</p></div><div style=${{display:"flex",flexDirection:"column",gap:13}}><${FW} label="TIPO DE MANUTENÇÃO"><div style=${{display:"flex",gap:8}}>${TIPOS.map(t=>{const c=TIPO_COL[t];const a=form.tipo===t;return html`<button key=${t} onClick=${()=>set("tipo",t)} style=${{flex:1,padding:"10px 4px",borderRadius:10,cursor:"pointer",border:`2px solid ${a?c:c+"44"}`,background:a?c+"22":"#1e293b",color:a?c:c+"77",fontSize:12,fontWeight:800,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span>${TIPO_ICO[t]}</span>${t}</button>`;})}</div><//>
<div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><${FW} label="TAG *" err=${errs.tag}><input value=${form.tag} onInput=${e=>set("tag",e.target.value)} placeholder="Ex: TC-017A" style=${{...inp(),border:`1px solid ${errs.tag?"#ef4444":"#334155"}`}}/><//>
<${FW} label="LOCAL *" err=${errs.local}><select value=${form.local} onChange=${e=>set("local",e.target.value)} style=${{...inp(),border:`1px solid ${errs.local?"#ef4444":"#334155"}`}}><option value="">Selecione...</option>${LOCAIS.map(l=>html`<option key=${l}>${l}</option>`)}</select><//>
</div><div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><${FW} label="SETOR"><select value=${form.setor} onChange=${e=>set("setor",e.target.value)} style=${inp()}>${SETORES.map(s=>html`<option key=${s}>${s}</option>`)}</select><//>
<${FW} label="CRITICIDADE"><select value=${form.criticidade} onChange=${e=>set("criticidade",e.target.value)} style=${{...inp(),color:CRIT_COL[form.criticidade],fontWeight:700}}>${CRITS.map(c=>html`<option key=${c} value=${c}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`)}</select><//>
<${FW} label="DATA"><input type="date" value=${form.data} onInput=${e=>set("data",e.target.value)} style=${inp()}/><//>
</div><${FW} label="Nº ENGEMAN"><input value=${form.engeman} onInput=${e=>set("engeman",e.target.value)} placeholder="Ex: 1087" style=${inp()}/><//>

</div></div><div style=${{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}><div style=${{background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:14}}><div style=${{fontSize:9,fontWeight:700,color:"#475569",letterSpacing:1.5,marginBottom:10}}>POR SETOR</div>${setorData.map(s=>html`<div key=${s.name} style=${{marginBottom:7}}><div style=${{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style=${{fontSize:11,color:"#94a3b8"}}>${s.name}</span><span style=${{fontSize:11,fontWeight:700,color:"#f59e0b"}}>${s.qt}</span></div><div style=${{height:4,background:"#0f172a",borderRadius:2}}><div style=${{height:"100%",background:"#f59e0b",borderRadius:2,width:`${(s.qt/Math.max(...setorData.map(x=>x.qt)))*100}%`}}></div></div></div>`)}</div><div style=${{background:"#1e293b",border:altas.length?"1px solid #ef444433":"1px solid #334155",borderRadius:12,padding:14}}><div style=${{fontSize:9,fontWeight:700,color:"#475569",letterSpacing:1.5,marginBottom:10}}>ALTA CRITICIDADE — EM ABERTO</div>${altas.length===0?html`<div style=${{color:"#475569",fontSize:12,padding:"20px 0",textAlign:"center"}}>✅ Nenhuma pendência de alta criticidade.</div>`:html`<div style=${{overflowX:"auto"}}><table style=${{width:"100%",borderCollapse:"collapse",fontSize:11}}><thead><tr>${["ID","Tipo","TAG","Local","Responsável","Status","Data"].map(h=>html`<th key=${h} style=${{textAlign:"left",padding:"4px 8px",color:"#475569",fontWeight:700,borderBottom:"1px solid #334155",fontSize:9}}>${h}</th>`)}</tr></thead><tbody>${altas.map(s=>html`<tr key=${s.id}><td style=${{padding:"6px 8px",color:"#f59e0b",fontWeight:800,fontFamily:"monospace"}}>${s.id}</td><td style=${{padding:"6px 8px"}}><span style=${{fontSize:10,color:TIPO_COL[s.tipo],fontWeight:700}}>${TIPO_ICO[s.tipo]} ${s.tipo}</span></td><td style=${{padding:"6px 8px",color:"#f1f5f9",fontFamily:"monospace"}}>${s.tag}</td><td style=${{padding:"6px 8px",color:"#94a3b8"}}>${s.local}</td><td style=${{padding:"6px 8px",color:"#64748b"}}>${s.responsavel||"—"}</td><td style=${{padding:"6px 8px"}}><${Badge} value=${s.status} type="status"/></td><td style=${{padding:"6px 8px",color:"#475569"}}>${s.data}</td></tr>`)}</tbody></table></div>`}</div></div></div></div>`;}
function ImportModal({data,onConfirm,onClose}){return html`<div style=${{position:"fixed",inset:0,background:"#00000099",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:500}} onClick=${onClose}><div style=${{background:"#1e293b",border:"1px solid #334155",borderRadius:14,maxWidth:400,width:"100%",padding:24}} onClick=${e=>e.stopPropagation()}><div style=${{fontSize:15,fontWeight:800,color:"#f1f5f9",marginBottom:5}}>Importar Excel</div><p style=${{color:"#94a3b8",fontSize:12,marginBottom:16}}>Encontrados <strong style=${{color:"#f59e0b"}}>${data.data.length} registros</strong>. Como importar?</p><div style=${{display:"flex",gap:8,marginBottom:8}}><button onClick=${()=>onConfirm("merge")} style=${{flex:1,background:"#818cf822",border:"1px solid #818cf8",borderRadius:8,padding:"9px 6px",color:"#818cf8",cursor:"pointer",fontWeight:700,fontSize:12}}>Mesclar</button><button onClick=${()=>onConfirm("replace")} style=${{flex:1,background:"#f59e0b22",border:"1px solid #f59e0b",borderRadius:8,padding:"9px 6px",color:"#f59e0b",cursor:"pointer",fontWeight:700,fontSize:12}}>Substituir tudo</button></div><button onClick=${onClose} style=${{width:"100%",background:"none",border:"1px solid #334155",borderRadius:8,padding:"7px",color:"#64748b",cursor:"pointer",fontSize:12}}>Cancelar</button></div></div>`;}
function App(){const [screen,setScreen]=useState("welcome");const [role,setRole]=useState(null);const [data,setData]=useState([]);const [dirHandle,setDirHandle]=useState(null);const [folderName,setFolderName]=useState(LS.get("sp_folder",null));const [importModal,setImportModal]=useState(null);const [saveStatus,setSaveStatus]=useState("idle");const autoSave=useCallback(async(newData,handle)=>{if(!handle)return;setSaveStatus("saving");try{const buf=toExcelBuf(newData);const fh=await handle.getFileHandle(FILENAME,{create:true});const w=await fh.createWritable();await w.write(new Blob([buf]));await w.close();setSaveStatus("ok");setTimeout(()=>setSaveStatus("idle"),3000);}catch{setSaveStatus("err");setTimeout(()=>setSaveStatus("idle"),4000);}},[]);const setDataAndSave=useCallback((newData)=>{setData(newData);if(dirHandle)autoSave(newData,dirHandle);},[dirHandle,autoSave]);const addSol=sol=>{const id=nextId(data);const nd=[{...sol,id,criadoEm:new Date().toISOString()},...data];setDataAndSave(nd);return id;};const updSol=(id,updates)=>{const nd=data.map(s=>s.id===id?{...s,...updates}:s);setDataAndSave(nd);};const loadFromHandle=async handle=>{try{const fh=await handle.getFileHandle(FILENAME);const file=await fh.getFile();const imported=await fromExcelFile(file);setData(imported.length?imported:SAMPLE);setDirHandle(handle);setFolderName(handle.name);LS.set("sp_folder",handle.name);setScreen("roles");}catch(e){if(e.name==="NotFoundError"){setData([]);setDirHandle(handle);setFolderName(handle.name);LS.set("sp_folder",handle.name);setScreen("roles");}else{alert("Erro ao carregar: "+e.message);}}};const saveToHandle=async(handle,d)=>{try{const buf=toExcelBuf(d);const fh=await handle.getFileHandle(FILENAME,{create:true});const w=await fh.createWritable();await w.write(new Blob([buf]));await w.close();alert(`✅ Salvo em "${handle.name}/${FILENAME}"!`);}catch(e){alert("Erro: "+e.message);}};const handleImportFile=async e=>{const file=e?.target?.files?.[0];if(!file)return;try{const d=await fromExcelFile(file);setImportModal({data:d});}catch{alert("Erro ao ler arquivo.");}if(e)e.target.value="";};const confirmImport=mode=>{if(!importModal)return;if(mode==="replace")setDataAndSave(importModal.data);else{const ids=new Set(data.map(d=>d.id));setDataAndSave([...data,...importModal.data.filter(d=>!ids.has(d.id))]);}setImportModal(null);setScreen("roles");};
if(screen==="welcome")return html`<${WelcomeScreen} onConnect=${loadFromHandle} onFileLoad=${async e=>{const file=e?.target?.files?.[0];if(!file)return;try{const d=await fromExcelFile(file);setData(d.length?d:SAMPLE);setScreen("roles");}catch{alert("Erro ao ler.");}}} onDemo=${()=>{setData(SAMPLE);setScreen("roles");}}/>`;
if(screen==="roles")return html`<div><${RoleSelector} onSelect=${r=>{setRole(r);setScreen("app");}} folderName=${folderName}/>${importModal?html`<${ImportModal} data=${importModal} onConfirm=${confirmImport} onClose=${()=>setImportModal(null)}/>`:null}</div>`;
return html`<div style=${{display:"flex",flexDirection:"column",height:"100vh",background:"#0f172a",position:"relative",overflow:"hidden"}}><${Header} role=${role} onBack=${()=>setScreen("roles")} pendentes=${data.filter(s=>s.status==="Pendente").length} data=${data} dirHandle=${dirHandle} setDirHandle=${h=>{setDirHandle(h);setFolderName(h.name);LS.set("sp_folder",h.name);}} onLoadFromSP=${loadFromHandle} onSaveToSP=${saveToHandle} onImportFile=${handleImportFile} saveStatus=${saveStatus}/>${role==="tecnico"?html`<${TecnicoView} onSubmit=${addSol}/>`:null}${role==="manutencao"?html`<${ManutencaoView} data=${data} onUpdate=${updSol}/>`:null}${role==="gestao"?html`<${GestaoView} data=${data}/>`:null}${importModal?html`<${ImportModal} data=${importModal} onConfirm=${confirmImport} onClose=${()=>setImportModal(null)}/>`:null}</div>`;}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
})();
</script>
