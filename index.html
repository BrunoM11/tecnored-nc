<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tecnored — Gestão de Não Conformidades</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;background:#0f172a;font-family:system-ui,-apple-system,sans-serif;color:#f1f5f9}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  input,select,textarea,button{font-family:inherit;color-scheme:dark}
  input[type=file]{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,Legend} = Recharts;
const XL = window.XLSX;

// ── Armazenamento local (por dispositivo) ─────────────────────────────────
const LS = {
  get:(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

// ── Constantes ────────────────────────────────────────────────────────────
const TIPO_COL = {Corretiva:"#ef4444",Preventiva:"#3b82f6",Melhoria:"#a855f7"};
const TIPO_ICO = {Corretiva:"⚙️",Preventiva:"🔍",Melhoria:"✨"};
const CRIT_COL = {alto:"#ef4444",médio:"#f59e0b",baixo:"#22c55e"};
const STAT_COL = {Pendente:"#818cf8","Em andamento":"#fb923c",Concluído:"#22c55e",Cancelado:"#64748b"};
const SETORES  = ["Mecânica","Elétrica","Instrumentação","Utilidades","Segurança"];
const LOCAIS   = ["Stock House","Moinho 1","Moinho 2","Britagem","Pátio","Cabine Elétrica","Sala Hidráulica","Processo","Expedição"];
const TIPOS    = ["Corretiva","Preventiva","Melhoria"];
const CRITS    = ["baixo","médio","alto"];
const STATS    = ["Pendente","Em andamento","Concluído","Cancelado"];
const MESES    = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const XCOLS    = ["ID","Tipo","TAG","Local","Nº Engeman","Status","Nível de Criticidade","Descrição","Sugestão","Data de Identificação","Setor Responsável","Responsável Manutenção","Prazo","Observações","Foto Conclusão","Data Conclusão","Histórico Status"];
const FILENAME = "Tecnored_NC.xlsx";

// ── Helpers ───────────────────────────────────────────────────────────────
const newRec = () => ({responsavel:"",prazo:"",observacoes:"",temFotoConclusao:false,dataConclusao:"",historicoStatus:[]});
const nextId = (d) => {const ns=d.map(x=>parseInt(x.id.replace("SOL-",""))).filter(n=>!isNaN(n));return `SOL-${String((ns.length?Math.max(...ns):0)+1).padStart(3,"0")}`;};
const parseDate = (v) => {if(!v)return new Date().toISOString().split("T")[0];if(v instanceof Date)return v.toISOString().split("T")[0];if(typeof v==="number"){const d=new Date(Math.round((v-25569)*864e5));return d.toISOString().split("T")[0];}return String(v).match(/\d{4}-\d{2}-\d{2}/)?.[0]||new Date().toISOString().split("T")[0];};
const nowStr = () => {const d=new Date();return `${d.toLocaleDateString("pt-BR")} ${d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`;};
const inp = (ex={}) => ({background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"9px 13px",color:"#f1f5f9",fontSize:13,outline:"none",width:"100%",...ex});

// ── Excel I/O ─────────────────────────────────────────────────────────────
function toExcelBuf(data) {
  const rows=[XCOLS,...data.map(s=>[s.id,s.tipo,s.tag,s.local,s.engeman||"",s.status,s.criticidade,s.descricao,s.sugestao||"",s.data,s.setor,s.responsavel||"",s.prazo||"",s.observacoes||"",s.temFotoConclusao?"Sim":"Não",s.dataConclusao||"",Array.isArray(s.historicoStatus)?s.historicoStatus.join(" | "):s.historicoStatus||""])];
  const ws=XL.utils.aoa_to_sheet(rows);
  ws["!cols"]=[8,12,10,14,10,14,16,40,30,14,14,16,10,30,12,14,50].map(w=>({wch:w}));
  const wb=XL.utils.book_new();XL.utils.book_append_sheet(wb,ws,"Solicitações");
  return XL.write(wb,{type:"array",bookType:"xlsx"});
}
function fromExcelFile(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XL.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XL.utils.sheet_to_json(ws,{header:1,defval:""});
        if(rows.length<2){res([]);return;}
        const h=rows[0].map(x=>String(x||"").toLowerCase());
        const fi=(...ks)=>{for(const k of ks){const i=h.findIndex(x=>x.includes(k));if(i>=0)return i;}return -1;};
        const iI=fi("id"),iT=fi("tipo"),iTAG=fi("tag"),iL=fi("local"),iE=fi("engeman"),iS=fi("status"),iC=fi("criticidade","nível"),iD=fi("descrição","descricao"),iSu=fi("sugestão","sugestao"),iDt=fi("data de"),iSe=fi("setor"),iR=fi("responsável","responsavel manut"),iP=fi("prazo"),iO=fi("observa"),iFo=fi("foto concl"),iDc=fi("data concl"),iH=fi("histórico","historico");
        const imported=rows.slice(1).filter(r=>r.some(c=>c!=="")).map((r,i)=>({
          id:(iI>=0&&r[iI])?String(r[iI]):`IMP-${String(i+1).padStart(3,"0")}`,
          tipo:(iT>=0&&r[iT])?r[iT]:"Corretiva",
          tag:iTAG>=0?String(r[iTAG]||""):"",
          local:iL>=0?String(r[iL]||""):"",
          engeman:iE>=0?String(r[iE]||""):"",
          status:iS>=0?String(r[iS]||"Pendente"):"Pendente",
          criticidade:iC>=0?String(r[iC]||"médio").toLowerCase():"médio",
          descricao:iD>=0?String(r[iD]||""):"",
          sugestao:iSu>=0?String(r[iSu]||""):"",
          data:iDt>=0?parseDate(r[iDt]):new Date().toISOString().split("T")[0],
          setor:iSe>=0?String(r[iSe]||"Mecânica"):"Mecânica",
          img:null,criadoEm:new Date().toISOString(),
          responsavel:iR>=0?String(r[iR]||""):"",
          prazo:iP>=0?parseDate(r[iP]):"",
          observacoes:iO>=0?String(r[iO]||""):"",
          temFotoConclusao:iFo>=0?String(r[iFo]||"").toLowerCase()==="sim":false,
          dataConclusao:iDc>=0?parseDate(r[iDc]):"",
          historicoStatus:iH>=0&&r[iH]?String(r[iH]).split(" | ").filter(Boolean):[],
        }));
        res(imported);
      }catch(err){rej(err);}
    };
    r.onerror=rej;r.readAsArrayBuffer(file);
  });
}

// ── Componentes compartilhados ────────────────────────────────────────────
function Badge({value,type}){
  const c=type==="tipo"?TIPO_COL[value]:type==="criticidade"?CRIT_COL[value]:STAT_COL[value]||"#64748b";
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 9px",borderRadius:12,background:c+"22",border:`1px solid ${c}55`,color:c,fontSize:11,fontWeight:700,textTransform:"capitalize",whiteSpace:"nowrap"}}>{type==="tipo"&&<span style={{fontSize:10}}>{TIPO_ICO[value]}</span>}{value}</span>;
}
function TipoBand({tipo}){
  const c=TIPO_COL[tipo]||"#64748b";
  return <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><div style={{width:3,height:16,background:c,borderRadius:2}}/><span style={{fontSize:11,fontWeight:800,color:c,letterSpacing:0.5}}>{TIPO_ICO[tipo]} {tipo?.toUpperCase()}</span></div>;
}

// ── Header ────────────────────────────────────────────────────────────────
function Header({role,onBack,pendentes,data,dirHandle,setDirHandle,onLoadFromSP,onSaveToSP,onImportFile,saveStatus}){
  const labels={tecnico:"Técnico de Operação",manutencao:"Programador de Manutenção",gestao:"Gestão Executiva"};
  const fileRef=useRef();
  const hasFSA=typeof window.showDirectoryPicker==="function";

  const connectSP=async()=>{
    try{const h=await window.showDirectoryPicker({mode:"readwrite"});setDirHandle(h);LS.set("sp_folder",h.name);setTimeout(()=>onLoadFromSP(h),300);}catch(e){}
  };
  const downloadExcel=()=>{
    const buf=toExcelBuf(data);
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=FILENAME;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  const sc={color:saveStatus==="ok"?"#22c55e":saveStatus==="saving"?"#f59e0b":saveStatus==="err"?"#ef4444":"#64748b"};
  const sl={Pendente:"...",saving:"Salvando",ok:"✓ Salvo",err:"Erro ao salvar"};

  return(
    <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
      <button onClick={onBack} style={{background:"none",border:"1px solid #334155",borderRadius:7,padding:"4px 10px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>← Sair</button>
      <div style={{width:1,height:22,background:"#334155"}}/>
      <div style={{flex:1,minWidth:120}}>
        <div style={{fontSize:8,letterSpacing:4,color:"#f59e0b",fontWeight:700}}>TECNORED</div>
        <div style={{color:"#f1f5f9",fontWeight:700,fontSize:12}}>{labels[role]}</div>
      </div>
      {saveStatus&&saveStatus!=="idle"&&<span style={{fontSize:11,...sc}}>{sl[saveStatus]||""}</span>}
      {pendentes>0&&<div style={{background:"#ef444422",border:"1px solid #ef444455",borderRadius:20,padding:"2px 9px",fontSize:11,color:"#ef4444",fontWeight:700}}>{pendentes} pendente{pendentes!==1?"s":""}</div>}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {hasFSA&&!dirHandle&&<button onClick={connectSP} style={{display:"flex",alignItems:"center",gap:5,background:"#0f172a",border:"1px solid #334155",borderRadius:7,padding:"5px 11px",color:"#94a3b8",cursor:"pointer",fontSize:11,fontWeight:600}}>📁 Conectar pasta SharePoint</button>}
        {hasFSA&&dirHandle&&<>
          <div style={{display:"flex",alignItems:"center",gap:5,background:"#22c55e11",border:"1px solid #22c55e44",borderRadius:7,padding:"5px 10px",color:"#22c55e",fontSize:11,fontWeight:600}}>✅ {dirHandle.name}</div>
          <button onClick={()=>onLoadFromSP(dirHandle)} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:7,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>🔄 Recarregar</button>
          <button onClick={()=>onSaveToSP(dirHandle,data)} style={{background:"#f59e0b22",border:"1px solid #f59e0b",borderRadius:7,padding:"5px 10px",color:"#f59e0b",cursor:"pointer",fontSize:11,fontWeight:700}}>💾 Salvar SharePoint</button>
        </>}
        {!hasFSA&&<>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={onImportFile}/>
          <button onClick={()=>fileRef.current.click()} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:7,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:11}}>📂 Carregar Excel</button>
          <button onClick={downloadExcel} style={{background:"#f59e0b22",border:"1px solid #f59e0b",borderRadius:7,padding:"5px 10px",color:"#f59e0b",cursor:"pointer",fontSize:11,fontWeight:700}}>📤 Exportar Excel</button>
        </>}
      </div>
    </div>
  );
}

// ── Tela de boas-vindas / conectar ────────────────────────────────────────
function WelcomeScreen({onConnect,onFileLoad,onDemo}){
  const hasFSA=typeof window.showDirectoryPicker==="function";
  const fileRef=useRef();
  const [connecting,setConnecting]=useState(false);
  const doConnect=async()=>{
    setConnecting(true);
    try{const h=await window.showDirectoryPicker({mode:"readwrite"});onConnect(h);}catch{}
    setConnecting(false);
  };
  return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{fontSize:9,letterSpacing:6,color:"#f59e0b",fontWeight:700,marginBottom:10}}>TECNORED — PRODUÇÃO &amp; MANUTENÇÃO</div>
        <h1 style={{fontSize:38,fontWeight:800,color:"#f1f5f9",lineHeight:1.1,letterSpacing:-1.5}}>GESTÃO DE NÃO<br/>CONFORMIDADES</h1>
        <p style={{marginTop:12,color:"#64748b",fontSize:14}}>Conecte a pasta do SharePoint para começar</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:420,width:"100%"}}>
        {hasFSA&&(
          <button onClick={doConnect} disabled={connecting} style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"16px 24px",fontSize:16,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <span style={{fontSize:20}}>📁</span>{connecting?"Aguardando seleção...":"Conectar pasta do SharePoint / OneDrive"}
          </button>
        )}
        <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:16}}>
          <div style={{fontSize:11,color:"#64748b",fontWeight:700,letterSpacing:1,marginBottom:10}}>ALTERNATIVA — SEM SHAREPOINT</div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={onFileLoad}/>
          <button onClick={()=>fileRef.current.click()} style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:9,padding:"11px",color:"#94a3b8",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span>📂</span>Carregar arquivo Excel manualmente
          </button>
        </div>
        <button onClick={onDemo} style={{background:"none",border:"1px solid #334155",borderRadius:10,padding:"11px",color:"#475569",cursor:"pointer",fontSize:13}}>
          🧪 Entrar com dados de demonstração
        </button>
      </div>
      <p style={{marginTop:28,fontSize:11,color:"#334155",maxWidth:380,textAlign:"center",lineHeight:1.6}}>
        Ao conectar a pasta, o sistema lê e salva o arquivo <strong style={{color:"#475569"}}>Tecnored_NC.xlsx</strong> diretamente no SharePoint via OneDrive sincronizado.
      </p>
    </div>
  );
}

// ── Seletor de perfil ─────────────────────────────────────────────────────
function RoleSelector({onSelect,folderName}){
  const [hov,setHov]=useState(null);
  const roles=[{id:"tecnico",label:"Técnico de Operação",desc:"Abrir nova solicitação",icon:"🔧"},{id:"manutencao",label:"Programador de Manutenção",desc:"Gerenciar e atualizar",icon:"📋"},{id:"gestao",label:"Gestão",desc:"Dashboard executivo",icon:"📊"}];
  return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontSize:9,letterSpacing:6,color:"#f59e0b",fontWeight:700,marginBottom:8}}>TECNORED — PRODUÇÃO &amp; MANUTENÇÃO</div>
        <h1 style={{fontSize:34,fontWeight:800,color:"#f1f5f9",lineHeight:1.1,letterSpacing:-1}}>GESTÃO DE NÃO<br/>CONFORMIDADES</h1>
        {folderName&&<div style={{marginTop:10,display:"inline-flex",alignItems:"center",gap:6,background:"#22c55e11",border:"1px solid #22c55e44",borderRadius:8,padding:"5px 12px",color:"#22c55e",fontSize:12,fontWeight:600}}>✅ {folderName}</div>}
      </div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center"}}>
        {roles.map(r=>(
          <button key={r.id} onClick={()=>onSelect(r.id)} onMouseEnter={()=>setHov(r.id)} onMouseLeave={()=>setHov(null)}
            style={{background:hov===r.id?"#1e3a5f":"#1e293b",border:`2px solid ${hov===r.id?"#f59e0b":"#334155"}`,borderRadius:14,padding:"24px 20px",cursor:"pointer",textAlign:"left",width:195,transition:"all 0.17s",outline:"none",display:"flex",flexDirection:"column",gap:10,transform:hov===r.id?"translateY(-3px)":""}}>
            <span style={{fontSize:32}}>{r.icon}</span>
            <div><div style={{color:"#f1f5f9",fontWeight:700,fontSize:14}}>{r.label}</div><div style={{color:"#64748b",fontSize:12,marginTop:3}}>{r.desc}</div></div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── TecnicoView ───────────────────────────────────────────────────────────
function TecnicoView({onSubmit}){
  const def={tipo:"Corretiva",tag:"",local:"",engeman:"",criticidade:"médio",descricao:"",sugestao:"",data:new Date().toISOString().split("T")[0],setor:"Mecânica",img:null,...newRec()};
  const [form,setForm]=useState(def);
  const [errs,setErrs]=useState({});
  const [done,setDone]=useState(null);
  const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrs(e=>({...e,[k]:""}));};
  const handleImg=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>set("img",ev.target.result);r.readAsDataURL(f);};
  const submit=()=>{const e={};if(!form.tag.trim())e.tag="Obrigatório";if(!form.local)e.local="Obrigatório";if(!form.descricao.trim())e.descricao="Obrigatório";if(Object.keys(e).length){setErrs(e);return;}setDone({id:onSubmit({...form}),tipo:form.tipo});};
  if(done)return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f172a"}}>
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:36,textAlign:"center",maxWidth:380}}>
        <div style={{fontSize:48,marginBottom:12}}>✅</div>
        <div style={{fontSize:20,fontWeight:800,color:"#f1f5f9",marginBottom:6}}>Solicitação enviada!</div>
        <div style={{fontSize:17,color:TIPO_COL[done.tipo]||"#f59e0b",fontWeight:800,marginBottom:14}}>{done.id}</div>
        <p style={{color:"#64748b",fontSize:12,marginBottom:20}}>Registrada com sucesso. O sistema salva automaticamente no SharePoint.</p>
        <button onClick={()=>{setDone(null);setForm(def);}} style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:10,padding:"11px 24px",fontSize:14,fontWeight:800,cursor:"pointer"}}>Nova Solicitação</button>
      </div>
    </div>
  );
  const FW=({label,err,ch})=><div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:10,fontWeight:700,color:"#64748b",letterSpacing:1}}>{label}</label>{ch}{err&&<span style={{fontSize:10,color:"#ef4444"}}>{err}</span>}</div>;
  return(
    <div style={{flex:1,background:"#0f172a",overflow:"auto",padding:"16px"}}>
      <div style={{maxWidth:600,margin:"0 auto"}}>
        <div style={{marginBottom:16}}><h2 style={{fontSize:20,fontWeight:800,color:"#f1f5f9"}}>Nova Solicitação</h2><p style={{color:"#64748b",fontSize:12,marginTop:2}}>Preencha os dados da não conformidade identificada</p></div>
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <FW label="TIPO DE MANUTENÇÃO" ch={
            <div style={{display:"flex",gap:8}}>
              {TIPOS.map(t=>{const c=TIPO_COL[t];const a=form.tipo===t;return<button key={t} onClick={()=>set("tipo",t)} style={{flex:1,padding:"10px 4px",borderRadius:10,cursor:"pointer",border:`2px solid ${a?c:c+"44"}`,background:a?c+"22":"#1e293b",color:a?c:c+"77",fontSize:12,fontWeight:800,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"all 0.15s"}}><span style={{fontSize:18}}>{TIPO_ICO[t]}</span>{t}</button>;})}
            </div>}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <FW label="TAG DO EQUIPAMENTO *" err={errs.tag} ch={<input value={form.tag} onChange={e=>set("tag",e.target.value)} placeholder="Ex: TC-017A" style={{...inp(),border:`1px solid ${errs.tag?"#ef4444":"#334155"}`}}/>}/>
            <FW label="LOCAL *" err={errs.local} ch={<select value={form.local} onChange={e=>set("local",e.target.value)} style={{...inp(),border:`1px solid ${errs.local?"#ef4444":"#334155"}`}}><option value="">Selecione...</option>{LOCAIS.map(l=><option key={l}>{l}</option>)}</select>}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <FW label="SETOR" ch={<select value={form.setor} onChange={e=>set("setor",e.target.value)} style={inp()}>{SETORES.map(s=><option key={s}>{s}</option>)}</select>}/>
            <FW label="CRITICIDADE" ch={<select value={form.criticidade} onChange={e=>set("criticidade",e.target.value)} style={{...inp(),color:CRIT_COL[form.criticidade],fontWeight:700}}>{CRITS.map(c=><option key={c} value={c}>{c.charAt(0).toUpperCase()+c.slice(1)}</option>)}</select>}/>
            <FW label="DATA" ch={<input type="date" value={form.data} onChange={e=>set("data",e.target.value)} style={inp()}/>}/>
          </div>
          <FW label="Nº ENGEMAN (opcional)" ch={<input value={form.engeman} onChange={e=>set("engeman",e.target.value)} placeholder="Ex: 1087" style={inp()}/>}/>
          <FW label="DESCRIÇÃO DA NÃO CONFORMIDADE *" err={errs.descricao} ch={<textarea value={form.descricao} onChange={e=>set("descricao",e.target.value)} rows={3} placeholder="Descreva o problema detalhadamente..." style={{...inp(),resize:"vertical",border:`1px solid ${errs.descricao?"#ef4444":"#334155"}`}}/>}/>
          <FW label="SUGESTÃO DE AÇÃO" ch={<textarea value={form.sugestao} onChange={e=>set("sugestao",e.target.value)} rows={2} placeholder="Sua sugestão para resolução..." style={{...inp(),resize:"vertical"}}/>}/>
          <FW label="EVIDÊNCIA FOTOGRÁFICA (opcional)" ch={
            <div style={{background:"#1e293b",border:"2px dashed #334155",borderRadius:9,padding:16,textAlign:"center"}}>
              {form.img?(<div><img src={form.img} alt="p" style={{maxWidth:"100%",maxHeight:160,borderRadius:8,marginBottom:8}}/><br/><button onClick={()=>set("img",null)} style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444444",borderRadius:5,padding:"3px 10px",cursor:"pointer",fontSize:11}}>Remover</button></div>):(<label style={{cursor:"pointer",display:"block"}}><input type="file" accept="image/*" onChange={handleImg}/><div style={{fontSize:28,marginBottom:6}}>📷</div><div style={{color:"#64748b",fontSize:13}}>Clique para adicionar foto da ocorrência</div></label>)}
            </div>}/>
          <button onClick={submit} style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:11,padding:"13px 24px",fontSize:15,fontWeight:800,cursor:"pointer"}}>ENVIAR SOLICITAÇÃO →</button>
        </div>
      </div>
    </div>
  );
}

// ── ManutencaoView ────────────────────────────────────────────────────────
function ManutencaoView({data,onUpdate}){
  const [f,setF]=useState({status:"",tipo:"",criticidade:"",q:""});
  const [sel,setSel]=useState(null);
  const [conclModal,setConclModal]=useState(false);
  const [conclPhoto,setConclPhoto]=useState(null);
  const [conclObs,setConclObs]=useState("");
  const [respEdit,setRespEdit]=useState("");
  const [prazoEdit,setPrazoEdit]=useState("");
  const [obsEdit,setObsEdit]=useState("");
  const [fotoConcl,setFotoConcl]=useState(null);
  const [saved,setSaved]=useState(false);

  const filtered=data.filter(s=>{
    if(f.status&&s.status!==f.status)return false;
    if(f.tipo&&s.tipo!==f.tipo)return false;
    if(f.criticidade&&s.criticidade!==f.criticidade)return false;
    if(f.q&&!(s.tag+s.descricao+s.local+s.id).toLowerCase().includes(f.q.toLowerCase()))return false;
    return true;
  });
  const tF=(k,v)=>setF(p=>({...p,[k]:p[k]===v?"":v}));

  const open=(s)=>{
    setSel(s);setRespEdit(s.responsavel||"");setPrazoEdit(s.prazo||"");setObsEdit(s.observacoes||"");setSaved(false);
    if(s.temFotoConclusao){const fc=LS.get(`foto_co_${s.id}`,null);setFotoConcl(fc);}else setFotoConcl(null);
  };

  const updStatus=(status)=>{
    if(status==="Concluído"&&sel.status!=="Concluído"){setConclModal(true);return;}
    const hist=[...(sel.historicoStatus||[]),`${nowStr()} — ${sel.status} → ${status}`];
    onUpdate(sel.id,{status,historicoStatus:hist});
    setSel(p=>p?{...p,status,historicoStatus:hist}:p);
  };

  const confirmConcl=()=>{
    const hist=[...(sel.historicoStatus||[]),`${nowStr()} — ${sel.status} → Concluído`];
    const updates={status:"Concluído",dataConclusao:new Date().toISOString().split("T")[0],historicoStatus:hist,observacoes:conclObs||sel.observacoes,temFotoConclusao:!!conclPhoto};
    if(conclPhoto)LS.set(`foto_co_${sel.id}`,conclPhoto);
    onUpdate(sel.id,updates);
    setSel(p=>p?{...p,...updates}:p);
    setFotoConcl(conclPhoto);
    setConclModal(false);setConclPhoto(null);setConclObs("");
  };

  const saveDetails=()=>{onUpdate(sel.id,{responsavel:respEdit,prazo:prazoEdit,observacoes:obsEdit});setSel(p=>p?{...p,responsavel:respEdit,prazo:prazoEdit,observacoes:obsEdit}:p);setSaved(true);};

  const Chip=({val,field,colors})=>{const a=f[field]===val;const c=colors?.[val]||"#f59e0b";return<button onClick={()=>tF(field,val)} style={{border:`1px solid ${a?c:c+"44"}`,borderRadius:20,padding:"2px 9px",background:a?c+"22":"transparent",color:a?c:c+"77",fontSize:10,fontWeight:700,cursor:"pointer",transition:"all 0.14s",textTransform:"capitalize"}}>{val}</button>;};

  return(
    <div style={{flex:1,background:"#0f172a",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>
      <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"10px 14px",display:"flex",flexDirection:"column",gap:8}}>
        <input placeholder="🔍  TAG, ID, local ou descrição..." value={f.q} onChange={e=>setF(p=>({...p,q:e.target.value}))} style={{...inp(),maxWidth:360,background:"#0f172a"}}/>
        <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
          {[{label:"TIPO",field:"tipo",opts:TIPOS,cols:TIPO_COL},{label:"STATUS",field:"status",opts:STATS,cols:STAT_COL},{label:"CRITICIDADE",field:"criticidade",opts:CRITS,cols:CRIT_COL}].map(({label,field,opts,cols})=>(
            <div key={field}><div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:3}}>{label}</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{opts.map(o=><Chip key={o} val={o} field={field} colors={cols}/>)}</div></div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid #334155"}}>
        {STATS.map(s=>{const cnt=data.filter(d=>d.status===s).length;const c=STAT_COL[s];return<div key={s} onClick={()=>tF("status",s)} style={{flex:1,textAlign:"center",padding:"7px 2px",borderRight:"1px solid #334155",cursor:"pointer",background:f.status===s?c+"11":"transparent"}}><div style={{fontSize:18,fontWeight:800,color:c}}>{cnt}</div><div style={{fontSize:9,color:"#475569"}}>{s}</div></div>;})}
      </div>
      <div style={{flex:1,overflow:"auto",padding:12}}>
        <div style={{fontSize:11,color:"#475569",marginBottom:8}}>{filtered.length} registro{filtered.length!==1?"s":""}</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:"#334155",fontSize:13}}>Nenhum resultado para os filtros aplicados.</div>}
          {filtered.map(s=>{
            const tc=TIPO_COL[s.tipo]||"#64748b";
            return<div key={s.id} onClick={()=>open(s)} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:9,padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,borderLeft:`4px solid ${tc}`,transition:"background 0.12s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="#1e3a5f";}} onMouseLeave={e=>{e.currentTarget.style.background="#1e293b";}}>
              <div style={{minWidth:68}}><div style={{fontSize:9,color:"#475569",letterSpacing:1}}>ID</div><div style={{fontSize:13,fontWeight:800,color:"#f59e0b",fontFamily:"monospace"}}>{s.id}</div></div>
              <div style={{minWidth:65}}><div style={{fontSize:9,color:"#475569"}}>TAG</div><div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",fontFamily:"monospace"}}>{s.tag}</div></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,color:tc,fontWeight:800,marginBottom:2}}>{TIPO_ICO[s.tipo]} {s.tipo?.toUpperCase()}</div>
                <div style={{fontSize:12,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.descricao}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:1}}>{s.local} · {s.setor}{s.responsavel&&` · ${s.responsavel}`}</div>
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
                <Badge value={s.status} type="status"/>
                <span style={{fontSize:9,color:CRIT_COL[s.criticidade],fontWeight:700}}>{s.criticidade}</span>
                {s.temFotoConclusao&&<span style={{fontSize:9,color:"#22c55e"}}>📷 concluído</span>}
              </div>
            </div>;
          })}
        </div>
      </div>

      {sel&&(
        <div style={{position:"absolute",inset:0,background:"#000000bb",display:"flex",alignItems:"center",justifyContent:"center",padding:14,zIndex:100}} onClick={()=>setSel(null)}>
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,maxWidth:540,width:"100%",maxHeight:"90vh",overflow:"auto",padding:24}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div><TipoBand tipo={sel.tipo}/><div style={{fontSize:9,color:"#f59e0b",letterSpacing:3,fontWeight:800}}>{sel.id}</div><div style={{fontSize:18,fontWeight:800,color:"#f1f5f9",marginTop:2}}>{sel.tag} — {sel.local}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{sel.setor} · {sel.data}</div></div>
              <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:18,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}><Badge value={sel.criticidade} type="criticidade"/><Badge value={sel.status} type="status"/>{sel.engeman&&<span style={{fontSize:11,color:"#64748b",padding:"2px 8px",border:"1px solid #334155",borderRadius:9}}>Engeman: {sel.engeman}</span>}</div>

            {/* Fotos antes / depois */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              <div>
                <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:4}}>📷 FOTO OCORRÊNCIA</div>
                {sel.img?<img src={sel.img} alt="oc" style={{width:"100%",borderRadius:7,maxHeight:130,objectFit:"cover"}}/>:<div style={{background:"#0f172a",borderRadius:7,height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#334155",fontSize:11}}>Sem foto</div>}
              </div>
              <div>
                <div style={{fontSize:9,color:fotoConcl?"#22c55e":"#475569",fontWeight:700,letterSpacing:1,marginBottom:4}}>📷 FOTO CONCLUSÃO</div>
                {fotoConcl?<img src={fotoConcl} alt="co" style={{width:"100%",borderRadius:7,maxHeight:130,objectFit:"cover"}}/>:<div style={{background:"#0f172a",borderRadius:7,height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#334155",fontSize:11}}>{sel.status==="Concluído"?"Sem foto":"—"}</div>}
              </div>
            </div>

            <div style={{marginBottom:10}}><div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:3}}>DESCRIÇÃO</div><p style={{color:"#cbd5e1",fontSize:12,lineHeight:1.6}}>{sel.descricao}</p></div>
            {sel.sugestao&&<div style={{marginBottom:12}}><div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:3}}>SUGESTÃO DO TÉCNICO</div><p style={{color:"#94a3b8",fontSize:12,lineHeight:1.6}}>{sel.sugestao}</p></div>}

            <div style={{background:"#0f172a",borderRadius:9,border:"1px solid #334155",padding:12,marginBottom:12}}>
              <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:8}}>PROGRAMAÇÃO DA MANUTENÇÃO</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><div style={{fontSize:9,color:"#475569",marginBottom:3}}>RESPONSÁVEL</div><input value={respEdit} onChange={e=>setRespEdit(e.target.value)} placeholder="Nome do técnico..." style={inp({fontSize:12})}/></div>
                <div><div style={{fontSize:9,color:"#475569",marginBottom:3}}>PRAZO</div><input type="date" value={prazoEdit} onChange={e=>setPrazoEdit(e.target.value)} style={inp({fontSize:12})}/></div>
              </div>
              <div style={{marginBottom:8}}><div style={{fontSize:9,color:"#475569",marginBottom:3}}>OBSERVAÇÕES</div><textarea value={obsEdit} onChange={e=>setObsEdit(e.target.value)} rows={2} placeholder="Observações da manutenção..." style={{...inp({fontSize:12}),resize:"vertical"}}/></div>
              <button onClick={saveDetails} style={{background:saved?"#22c55e22":"#f59e0b22",border:`1px solid ${saved?"#22c55e":"#f59e0b"}`,borderRadius:7,padding:"6px 14px",color:saved?"#22c55e":"#f59e0b",cursor:"pointer",fontSize:12,fontWeight:700}}>{saved?"✓ Salvo":"Salvar detalhes"}</button>
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:6}}>ATUALIZAR STATUS</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {STATS.map(s=>{const c=STAT_COL[s];const a=sel.status===s;return<button key={s} onClick={()=>updStatus(s)} style={{flex:1,padding:"8px 4px",borderRadius:8,cursor:"pointer",border:`2px solid ${a?c:c+"44"}`,background:a?c+"22":"transparent",color:a?c:c+"77",fontSize:11,fontWeight:700,minWidth:80}}>{s}</button>;})}
              </div>
            </div>

            {sel.historicoStatus?.length>0&&<div>
              <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:6}}>HISTÓRICO DE STATUS</div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {sel.historicoStatus.map((h,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}><div style={{width:6,height:6,borderRadius:"50%",background:"#334155",marginTop:4,flexShrink:0}}/><span style={{fontSize:11,color:"#64748b"}}>{h}</span></div>)}
              </div>
            </div>}
          </div>
        </div>
      )}

      {conclModal&&(
        <div style={{position:"absolute",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:200}}>
          <div style={{background:"#1e293b",border:"1px solid #22c55e55",borderRadius:14,maxWidth:400,width:"100%",padding:24}}>
            <div style={{fontSize:17,fontWeight:800,color:"#f1f5f9",marginBottom:5}}>✅ Registrar Conclusão</div>
            <p style={{color:"#64748b",fontSize:12,marginBottom:14}}>Adicione a foto do trabalho concluído e observações finais.</p>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:5}}>FOTO DO TRABALHO CONCLUÍDO</div>
              <div style={{background:"#0f172a",border:"2px dashed #334155",borderRadius:8,padding:14,textAlign:"center"}}>
                {conclPhoto?(<div><img src={conclPhoto} alt="c" style={{maxWidth:"100%",maxHeight:120,borderRadius:6,marginBottom:8}}/><br/><button onClick={()=>setConclPhoto(null)} style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444444",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontSize:11}}>Remover</button></div>):(<label style={{cursor:"pointer",display:"block"}}><input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setConclPhoto(ev.target.result);r.readAsDataURL(f);}}/><div style={{fontSize:24,marginBottom:5}}>📷</div><div style={{color:"#64748b",fontSize:12}}>Foto após conclusão</div></label>)}
              </div>
            </div>
            <div style={{marginBottom:14}}><div style={{fontSize:10,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:5}}>OBSERVAÇÕES FINAIS</div><textarea value={conclObs} onChange={e=>setConclObs(e.target.value)} rows={2} placeholder="O que foi executado..." style={{...inp({fontSize:12}),resize:"vertical"}}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setConclModal(false);setConclPhoto(null);setConclObs("");}} style={{flex:1,background:"none",border:"1px solid #334155",borderRadius:8,padding:"9px",color:"#64748b",cursor:"pointer",fontSize:12}}>Cancelar</button>
              <button onClick={confirmConcl} style={{flex:2,background:"#22c55e",color:"#000",border:"none",borderRadius:8,padding:"9px",fontSize:13,fontWeight:800,cursor:"pointer"}}>Confirmar Conclusão ✓</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── GestaoView ────────────────────────────────────────────────────────────
function GestaoView({data}){
  const kpis=[
    {label:"Total",v:data.length,c:"#94a3b8"},
    {label:"Pendentes",v:data.filter(s=>s.status==="Pendente").length,c:STAT_COL.Pendente},
    {label:"Em Andamento",v:data.filter(s=>s.status==="Em andamento").length,c:STAT_COL["Em andamento"]},
    {label:"Concluídos",v:data.filter(s=>s.status==="Concluído").length,c:STAT_COL.Concluído},
    {label:"Melhorias",v:data.filter(s=>s.tipo==="Melhoria").length,c:TIPO_COL.Melhoria},
    {label:"Alta Criticidade",v:data.filter(s=>s.criticidade==="alto").length,c:CRIT_COL.alto},
  ];
  const tt={background:"#1e293b",border:"1px solid #334155",borderRadius:7,color:"#f1f5f9",fontSize:11};
  const Card=({title,ch,style})=><div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:14,...style}}><div style={{fontSize:9,fontWeight:700,color:"#475569",letterSpacing:1.5,marginBottom:10}}>{title}</div>{ch}</div>;

  const now=new Date();
  const monthlyData=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    const m=d.getMonth(),y=d.getFullYear();
    const rows=data.filter(s=>{const sd=new Date(s.data);return sd.getMonth()===m&&sd.getFullYear()===y;});
    return{name:`${MESES[m]}/${String(y).slice(2)}`,Corretiva:rows.filter(s=>s.tipo==="Corretiva").length,Preventiva:rows.filter(s=>s.tipo==="Preventiva").length,Melhoria:rows.filter(s=>s.tipo==="Melhoria").length};
  });

  const statData=STATS.map(s=>({name:s,value:data.filter(d=>d.status===s).length,fill:STAT_COL[s]})).filter(s=>s.value>0);
  const setorData=SETORES.map(s=>({name:s,qt:data.filter(d=>d.setor===s).length})).filter(s=>s.qt>0).sort((a,b)=>b.qt-a.qt);
  const altas=data.filter(s=>s.criticidade==="alto"&&!["Concluído","Cancelado"].includes(s.status));

  return(
    <div style={{flex:1,background:"#0f172a",overflow:"auto",padding:16}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{marginBottom:14}}><h2 style={{fontSize:18,fontWeight:800,color:"#f1f5f9"}}>Dashboard Executivo</h2><p style={{color:"#64748b",fontSize:11,marginTop:2}}>Visão geral das solicitações de manutenção</p></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:12}}>
          {kpis.map(k=><div key={k.label} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px 10px",borderTop:`3px solid ${k.c}`}}><div style={{fontSize:26,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div><div style={{fontSize:9,color:"#64748b",marginTop:3}}>{k.label}</div></div>)}
        </div>
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          {TIPOS.map(t=>{const c=TIPO_COL[t];return<div key={t} style={{display:"flex",alignItems:"center",gap:6,background:"#1e293b",border:`1px solid ${c}44`,borderRadius:8,padding:"6px 12px"}}><div style={{width:10,height:10,borderRadius:2,background:c}}/><span style={{fontSize:11,color:c,fontWeight:700}}>{TIPO_ICO[t]} {t}</span><span style={{fontSize:14,color:c,fontWeight:800,marginLeft:4}}>{data.filter(d=>d.tipo===t).length}</span></div>;})}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:10}}>
          <Card title="HISTÓRICO MENSAL POR TIPO (últimos 6 meses)" ch={
            <ResponsiveContainer width="100%" height={160}>
              <BarChart data={monthlyData}>
                <XAxis dataKey="name" tick={{fill:"#64748b",fontSize:10}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:"#64748b",fontSize:9}} axisLine={false} tickLine={false} allowDecimals={false}/>
                <Tooltip contentStyle={tt} cursor={{fill:"#ffffff08"}}/>
                <Legend iconType="circle" iconSize={6} formatter={v=><span style={{color:"#94a3b8",fontSize:9}}>{v}</span>}/>
                <Bar dataKey="Corretiva" stackId="a" fill={TIPO_COL.Corretiva}/>
                <Bar dataKey="Preventiva" stackId="a" fill={TIPO_COL.Preventiva}/>
                <Bar dataKey="Melhoria" stackId="a" fill={TIPO_COL.Melhoria} radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>}/>
          <Card title="STATUS" ch={
            <ResponsiveContainer width="100%" height={160}>
              <PieChart><Pie data={statData} cx="50%" cy="42%" outerRadius={52} dataKey="value" nameKey="name">{statData.map((e,i)=><Cell key={i} fill={e.fill}/>)}</Pie><Tooltip contentStyle={tt}/><Legend iconType="circle" iconSize={6} formatter={v=><span style={{color:"#94a3b8",fontSize:9}}>{v}</span>}/></PieChart>
            </ResponsiveContainer>}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}>
          <Card title="POR SETOR" ch={
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {setorData.map(s=><div key={s.name}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,color:"#94a3b8"}}>{s.name}</span><span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>{s.qt}</span></div><div style={{height:4,background:"#0f172a",borderRadius:2}}><div style={{height:"100%",background:"#f59e0b",borderRadius:2,width:`${(s.qt/Math.max(...setorData.map(x=>x.qt)))*100}%`}}/></div></div>)}
            </div>}/>
          <Card title="ALTA CRITICIDADE — EM ABERTO" style={altas.length?{border:"1px solid #ef444433"}:{}} ch={
            altas.length===0?<div style={{color:"#475569",fontSize:12,padding:"20px 0",textAlign:"center"}}>✅ Nenhuma pendência de alta criticidade.</div>:
            <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}><thead><tr>{["ID","Tipo","TAG","Local","Responsável","Status","Data"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px",color:"#475569",fontWeight:700,borderBottom:"1px solid #334155",fontSize:9}}>{h}</th>)}</tr></thead>
            <tbody>{altas.map(s=><tr key={s.id}><td style={{padding:"6px 8px",color:"#f59e0b",fontWeight:800,fontFamily:"monospace"}}>{s.id}</td><td style={{padding:"6px 8px"}}><span style={{fontSize:10,color:TIPO_COL[s.tipo],fontWeight:700}}>{TIPO_ICO[s.tipo]} {s.tipo}</span></td><td style={{padding:"6px 8px",color:"#f1f5f9",fontFamily:"monospace"}}>{s.tag}</td><td style={{padding:"6px 8px",color:"#94a3b8"}}>{s.local}</td><td style={{padding:"6px 8px",color:"#64748b"}}>{s.responsavel||"—"}</td><td style={{padding:"6px 8px"}}><Badge value={s.status} type="status"/></td><td style={{padding:"6px 8px",color:"#475569"}}>{s.data}</td></tr>)}</tbody></table></div>}/>
        </div>
      </div>
    </div>
  );
}

// ── App principal ─────────────────────────────────────────────────────────
const SAMPLE=[
  {id:"SOL-001",tipo:"Corretiva",tag:"TC-017A",local:"Stock House",engeman:"1087",status:"Pendente",criticidade:"médio",descricao:"Desalinhamento da correia transportadora causando queda de material",sugestao:"Ajuste nos guias laterais",data:"2025-04-15",setor:"Mecânica",img:null,criadoEm:"2025-04-15T08:30:00Z",...newRec()},
  {id:"SOL-002",tipo:"Corretiva",tag:"MC-003",local:"Moinho 1",engeman:"1088",status:"Em andamento",criticidade:"alto",descricao:"Vibração anormal no rolamento do motor principal com ruído metálico",sugestao:"Substituição do rolamento 6310",data:"2025-04-16",setor:"Mecânica",img:null,criadoEm:"2025-04-16T10:00:00Z",...newRec(),responsavel:"João Silva"},
  {id:"SOL-003",tipo:"Melhoria",tag:"IN-008",local:"Processo",engeman:"",status:"Pendente",criticidade:"médio",descricao:"Sensor de nível com leitura inconsistente variando ±5%",sugestao:"Calibração ou substituição do sensor",data:"2025-04-19",setor:"Instrumentação",img:null,criadoEm:"2025-04-19T14:00:00Z",...newRec()},
  {id:"SOL-004",tipo:"Preventiva",tag:"BC-011",local:"Britagem",engeman:"1090",status:"Concluído",criticidade:"baixo",descricao:"Vazamento de graxa no mancal da britadeira cônica",sugestao:"Reaperto e troca de vedação",data:"2025-03-18",setor:"Mecânica",img:null,criadoEm:"2025-03-18T09:00:00Z",...newRec(),responsavel:"Carlos Mendes",dataConclusao:"2025-03-20",historicoStatus:["20/03/2025 14:30 — Pendente → Concluído"]},
  {id:"SOL-005",tipo:"Melhoria",tag:"EX-001",local:"Expedição",engeman:"",status:"Pendente",criticidade:"baixo",descricao:"Iluminação insuficiente na área de carregamento no turno noturno",sugestao:"Instalação de 4 luminárias LED 200W",data:"2025-03-22",setor:"Elétrica",img:null,criadoEm:"2025-03-22T16:00:00Z",...newRec()},
  {id:"SOL-006",tipo:"Corretiva",tag:"HY-002",local:"Sala Hidráulica",engeman:"1093",status:"Concluído",criticidade:"alto",descricao:"Pressão do sistema hidráulico 30% abaixo do especificado",sugestao:"Inspeção da bomba e verificação de vazamentos",data:"2025-02-21",setor:"Mecânica",img:null,criadoEm:"2025-02-21T08:00:00Z",...newRec(),responsavel:"Carlos Mendes",dataConclusao:"2025-02-23",temFotoConclusao:false,historicoStatus:["22/02/2025 09:00 — Pendente → Em andamento","23/02/2025 16:45 — Em andamento → Concluído"]},
];

function App(){
  const [screen,setScreen]=useState("welcome"); // welcome | roles | app
  const [role,setRole]=useState(null);
  const [data,setData]=useState([]);
  const [dirHandle,setDirHandle]=useState(null);
  const [folderName,setFolderName]=useState(LS.get("sp_folder",null));
  const [importModal,setImportModal]=useState(null);
  const [saveStatus,setSaveStatus]=useState("idle");

  const autoSave=useCallback(async(newData,handle)=>{
    if(!handle)return;
    setSaveStatus("saving");
    try{
      const buf=toExcelBuf(newData);
      const fh=await handle.getFileHandle(FILENAME,{create:true});
      const w=await fh.createWritable();await w.write(new Blob([buf]));await w.close();
      setSaveStatus("ok");setTimeout(()=>setSaveStatus("idle"),3000);
    }catch{setSaveStatus("err");setTimeout(()=>setSaveStatus("idle"),4000);}
  },[]);

  const setDataAndSave=(newData)=>{setData(newData);if(dirHandle)autoSave(newData,dirHandle);};
  const addSol=(sol)=>{const id=nextId(data);const nd=[{...sol,id,criadoEm:new Date().toISOString()},...data];setDataAndSave(nd);return id;};
  const updSol=(id,updates)=>{const nd=data.map(s=>s.id===id?{...s,...updates}:s);setDataAndSave(nd);};

  const loadFromHandle=async(handle)=>{
    try{
      const fh=await handle.getFileHandle(FILENAME);
      const file=await fh.getFile();
      const imported=await fromExcelFile(file);
      setData(imported.length?imported:SAMPLE);
      setDirHandle(handle);setFolderName(handle.name);LS.set("sp_folder",handle.name);
      setScreen("roles");
    }catch(e){
      if(e.name==="NotFoundError"){
        // Arquivo não existe ainda — inicia vazio e conecta
        setData([]); setDirHandle(handle); setFolderName(handle.name);
        LS.set("sp_folder",handle.name); setScreen("roles");
      }else{alert("Erro ao carregar arquivo: "+e.message);}
    }
  };

  const saveToHandle=async(handle,d)=>{
    try{
      const buf=toExcelBuf(d);
      const fh=await handle.getFileHandle(FILENAME,{create:true});
      const w=await fh.createWritable();await w.write(new Blob([buf]));await w.close();
      alert(`✅ Salvo em "${handle.name}/${FILENAME}" com sucesso!`);
    }catch(e){alert("Erro ao salvar: "+e.message);}
  };

  const handleImportFile=async(e)=>{
    const file=e?.target?.files?.[0];if(!file)return;
    try{const d=await fromExcelFile(file);setImportModal({data:d});}catch{alert("Erro ao ler arquivo.");}
    if(e)e.target.value="";
  };
  const confirmImport=(mode)=>{
    if(!importModal)return;
    if(mode==="replace")setDataAndSave(importModal.data);
    else{const ids=new Set(data.map(d=>d.id));setDataAndSave([...data,...importModal.data.filter(d=>!ids.has(d.id))]);}
    setImportModal(null);setScreen("roles");
  };

  if(screen==="welcome") return(
    <WelcomeScreen
      onConnect={loadFromHandle}
      onFileLoad={async(e)=>{const file=e?.target?.files?.[0];if(!file)return;try{const d=await fromExcelFile(file);setData(d.length?d:SAMPLE);setScreen("roles");}catch{alert("Erro ao ler arquivo.");}}}
      onDemo={()=>{setData(SAMPLE);setScreen("roles");}}/>
  );

  if(screen==="roles") return <>
    <RoleSelector onSelect={r=>{setRole(r);setScreen("app");}} folderName={folderName}/>
    {importModal&&<ImportModal data={importModal} onConfirm={confirmImport} onClose={()=>setImportModal(null)}/>}
  </>;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#0f172a",position:"relative",overflow:"hidden"}}>
      <Header role={role} onBack={()=>setScreen("roles")} pendentes={data.filter(s=>s.status==="Pendente").length} data={data} dirHandle={dirHandle} setDirHandle={h=>{setDirHandle(h);setFolderName(h.name);LS.set("sp_folder",h.name);}} onLoadFromSP={loadFromHandle} onSaveToSP={saveToHandle} onImportFile={handleImportFile} saveStatus={saveStatus}/>
      {role==="tecnico"&&<TecnicoView onSubmit={addSol}/>}
      {role==="manutencao"&&<ManutencaoView data={data} onUpdate={updSol}/>}
      {role==="gestao"&&<GestaoView data={data}/>}
      {importModal&&<ImportModal data={importModal} onConfirm={confirmImport} onClose={()=>setImportModal(null)}/>}
    </div>
  );
}

function ImportModal({data,onConfirm,onClose}){
  return<div style={{position:"fixed",inset:0,background:"#00000099",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:500}} onClick={onClose}>
    <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:14,maxWidth:400,width:"100%",padding:24}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:15,fontWeight:800,color:"#f1f5f9",marginBottom:5}}>Importar Excel</div>
      <p style={{color:"#94a3b8",fontSize:12,marginBottom:16}}>Encontrados <strong style={{color:"#f59e0b"}}>{data.data.length} registros</strong>. Como deseja importar?</p>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <button onClick={()=>onConfirm("merge")} style={{flex:1,background:"#818cf822",border:"1px solid #818cf8",borderRadius:8,padding:"9px 6px",color:"#818cf8",cursor:"pointer",fontWeight:700,fontSize:12}}>Mesclar (adicionar novos)</button>
        <button onClick={()=>onConfirm("replace")} style={{flex:1,background:"#f59e0b22",border:"1px solid #f59e0b",borderRadius:8,padding:"9px 6px",color:"#f59e0b",cursor:"pointer",fontWeight:700,fontSize:12}}>Substituir tudo</button>
      </div>
      <button onClick={onClose} style={{width:"100%",background:"none",border:"1px solid #334155",borderRadius:8,padding:"7px",color:"#64748b",cursor:"pointer",fontSize:12}}>Cancelar</button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
